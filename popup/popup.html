<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      width: 100%;
      max-width: 400px;
      padding: 16px;
      background: #0f0f0f;
      color: #f0f0f0;
      min-height: 100vh;
    }

    h2 {
      font-size: 15px;
      margin-bottom: 2px;
      color: #fff;
    }

    #step-counter {
      font-size: 11px;
      color: #888;
      margin-bottom: 10px;
    }

    #progress-wrap {
      background: #2a2a2a;
      border-radius: 4px;
      height: 4px;
      margin-bottom: 14px;
    }

    #progress-bar {
      height: 4px;
      background: #FF6B35;
      border-radius: 4px;
      transition: width 0.3s;
      width: 0%;
    }

    #step-instruction {
      font-size: 13px;
      color: #ccc;
      margin-bottom: 12px;
      line-height: 1.6;
    }

    #step-screenshot {
      width: 100%;
      border-radius: 6px;
      margin-bottom: 12px;
      border: 1px solid #333;
      display: none;
    }

    #captured-value {
      font-size: 11px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 10px;
      white-space: pre-wrap;
      word-break: break-all;
      color: #7ec8a0;
      display: none;
    }

    #input-area {
      margin-bottom: 12px;
    }

    .field-row {
      margin-bottom: 8px;
    }

    .field-row label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 3px;
    }

    .field-row input,
    .field-row select,
    .field-row textarea {
      width: 100%;
      padding: 6px 8px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #f0f0f0;
      font-size: 13px;
    }

    .field-row textarea {
      resize: vertical;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    button {
      padding: 8px 14px;
      border: none;
      border-radius: 5px;
      font-size: 13px;
      cursor: pointer;
      font-weight: 500;
    }

    #btn-capture {
      width: 100%;
      background: #FF6B35;
      color: white;
      margin-bottom: 10px;
      padding: 10px;
    }

    #btn-next {
      background: #2563eb;
      color: white;
      flex: 1;
    }

    #btn-back {
      background: #2a2a2a;
      color: #ccc;
      flex: 1;
    }

    #btn-export {
      width: 100%;
      background: #16a34a;
      color: white;
      padding: 10px;
      font-size: 14px;
      margin-bottom: 8px;
    }

    #btn-restart {
      width: 100%;
      background: #7f1d1d;
      color: #fca5a5;
      padding: 8px;
      font-size: 12px;
    }

    .captured-label {
      font-size: 10px;
      color: #16a34a;
      margin-bottom: 4px;
      display: none;
    }
  </style>
</head>

<body>
  <h2 id="step-title">Booking Wizard</h2>
  <div id="step-counter"></div>
  <div id="progress-wrap">
    <div id="progress-bar"></div>
  </div>
  <p id="step-instruction"></p>
  <img id="step-screenshot" src="" alt="Screenshot guide">
  <div class="captured-label" id="captured-label">✅ Captured!</div>
  <div id="captured-value"></div>
  <div id="input-area"></div>
  <button id="btn-capture" style="display:none">Capture</button>
  <button id="btn-export" style="display:none">⬇️ Export gym-config.json</button>
  <button id="btn-restart" style="display:none">🔄 Start Over</button>
  <div class="btn-row">
    <button id="btn-back" style="display:none">← Back</button>
    <button id="btn-next">Next →</button>
  </div>
  <script src="popup.js"></script>
</body>

</html>
